<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Mic→WebSocket→FIFO</title>
    <style>body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;padding:24px}</style>
  </head>
  <body>
    <h1>マイク入力を送信</h1>
    <p id="status">準備完了</p>
    <div style="margin-top:8px">
      <button id="requestPerm">マイク権限を要求</button>
      <span id="permStatus" style="margin-left:8px">権限: 不明</span>
    </div>

    <label>入力デバイス: <select id="micSelect"></select></label>
    <label style="margin-left:12px"><input type="checkbox" id="emit" /> ローカル再生（Emit voice）</label>
    <div style="margin-top:12px">
      <button id="start">開始</button>
      <button id="stop" disabled>停止</button>
    </div>
    <div style="margin-top:12px">
      <label>音量: <input id="volume" type="range" min="0" max="2" step="0.01" value="1" /></label>
      <span id="volumeValue">1.00</span>
    </div>

    <h3>可視化</h3>
    <canvas id="viz" width="600" height="100" style="border:1px solid #ddd"></canvas>

    <script src="/app.js"></script>
  </body>
</html>
